name: devis-vocal
version: 1.0.0
description: Transforme un mémo vocal du patron (WhatsApp/Telegram) en devis chiffré prêt à envoyer.
author: Hermès Platform
category: sales
triggers:
  - type: webhook
    path: /devis-vocal/ingest
    method: POST
  - type: channel-message
    channels: [whatsapp, telegram]
    match: { has_audio: true, intent: "devis" }
inputs:
  audio_url: string
  caller_or_sender: string
  context_text: string?
outputs:
  draft_quote_id: string
  total_eur: number
  line_items: array
  pdf_url: string?
  ready_to_send: boolean
requires:
  channels_optional: [whatsapp, telegram]
  llm: anthropic-sonnet
  skills_optional: [crm-client-lookup]
config:
  asr_provider: "gemini"             # voice -> text
  pricing_source: "client_catalog"   # client_catalog | gpt_estimate
  default_margin_pct: 25
human_in_the_loop:
  required: true
  channel: telegram
  prompt: "Devis brouillon prêt — confirmer envoi au client ?"
