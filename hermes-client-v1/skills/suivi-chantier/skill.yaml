name: suivi-chantier
version: 1.0.0
description: Surveille l'avancée des chantiers/RDV clients et notifie en cas de retard ou écart.
author: Hermès Platform
category: operations
triggers:
  - type: cron
    schedule: "*/30 * * * *"         # toutes les 30 min
  - type: webhook
    path: /suivi-chantier/check
inputs:
  appointment_id: string?
outputs:
  chantiers_checked: number
  alerts_sent: number
  reports_generated: number
requires:
  channels: [telegram]
  channels_optional: [whatsapp, email]
  llm: anthropic-haiku
  data_sources: [supabase.appointments, supabase.site_photos]
config:
  alert_thresholds:
    delay_minutes: 30                # RDV non démarré 30 min après l'heure prévue
    no_photo_after_hours: 24
  report_at_end_of_day: true
  weather_check: true                # via open-meteo (intempéries J+1)
human_in_the_loop:
  required: false
