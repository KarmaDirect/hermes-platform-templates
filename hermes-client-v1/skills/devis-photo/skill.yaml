name: devis-photo
version: 1.0.0
description: Analyse une photo de chantier et propose un devis chiffré (surfaces, matériaux, main d'œuvre).
author: Hermès Platform
category: sales
triggers:
  - type: webhook
    path: /devis-photo/ingest
    method: POST
  - type: channel-message
    channels: [whatsapp, telegram, email]
    match: { has_image: true }
inputs:
  image_urls: array
  context_text: string?
  client_id: string?
outputs:
  draft_quote_id: string
  detected_scope: string
  total_eur: number
  confidence: number
  pdf_url: string?
requires:
  llm: gemini-vision
  skills_optional: [crm-client-lookup, devis-vocal]
config:
  vision_model: "gemini-2.0-flash"
  min_confidence_to_send: 0.7
  vertical_prompts:
    btp: "Estime surfaces, matériaux apparents et travaux requis. Liste lignes de devis."
human_in_the_loop:
  required: true
  channel: telegram
  prompt: "Devis estimé depuis photo — confirmer ou ajuster ?"
