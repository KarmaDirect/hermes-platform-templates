name: posts-sociaux
version: 1.0.0
description: Génère et publie des posts (Insta/FB/LinkedIn) à partir des photos de chantier ou actus client.
author: Hermès Platform
category: marketing
triggers:
  - type: cron
    schedule: "0 10 * * 1,3,5"       # lun/mer/ven 10h
  - type: webhook
    path: /posts-sociaux/draft
inputs:
  source: string                     # "chantier" | "actu" | "manual"
  asset_urls: array?
  caption_hint: string?
outputs:
  drafts: array
  scheduled: array
requires:
  channels: [instagram]
  channels_optional: [whatsapp]
  llm: anthropic-sonnet
  external_api: zernio                # remplace Postiz/Buffer
config:
  platforms: ["instagram", "facebook", "linkedin"]
  hashtags_strategy: "vertical_local"  # mixe hashtags secteur + ville
  max_posts_per_week: 3
human_in_the_loop:
  required: true
  channel: telegram
  prompt: "3 brouillons prêts — valider/éditer avant publication ?"
