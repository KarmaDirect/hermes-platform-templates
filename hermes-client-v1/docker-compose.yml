# =============================================================================
# Hermes Client Edition v1 — docker-compose
# =============================================================================
# One-service-per-client stack. Designed to be deployed by the Hermes Platform
# control-plane via Coolify, with env vars injected per tenant.
#
# Profiles:
#   default          -> hermes only
#   with-paperclip   -> hermes + paperclip (issue tracker, optional)
#
# Volumes are NAMED so Coolify keeps them across redeploys.
# =============================================================================

services:
  hermes:
    container_name: hermes-${CLIENT_SLUG:-unknown}
    image: ghcr.io/karmadirect/hermes-client:${HERMES_TEMPLATE_VERSION:-v1}
    pull_policy: missing
    restart: unless-stopped
    # No host-port mapping : Traefik routes via the `coolify` Docker network
    # (label below points at port 9119 inside the container), and the
    # control-plane proxy resolves the gateway by Docker DNS too. Publishing
    # 9119 on the host would prevent running > 1 tenant container in parallel.
    environment:
      # ----- Identity -----
      CLIENT_NAME:         ${CLIENT_NAME}
      CLIENT_SLUG:         ${CLIENT_SLUG}
      CLIENT_VERTICAL:     ${CLIENT_VERTICAL:-generic}
      CLIENT_BRAND_COLOR:  ${CLIENT_BRAND_COLOR:-#3b82f6}
      CLIENT_TONE:         ${CLIENT_TONE:-pro}

      # ----- Hermes auth -----
      HERMES_API_TOKEN:    ${HERMES_API_TOKEN}

      # ----- Bootstrap self-healing (set by control-plane provisioner) -----
      # The bootstrap.sh uses these to (a) self-correct `instances.api_token`
      # if the env-injected token diverges from DB, (b) auto-apply Composio
      # MCP config from `tenant_integrations` + `platform_settings` on boot.
      INSTANCE_ID:                 ${INSTANCE_ID:-}
      ORG_ID:                      ${ORG_ID:-}
      COMPOSIO_API_KEY:            ${COMPOSIO_API_KEY:-}

      # ----- LLM providers -----
      # Source primaire = Nous Portal (StepFun-3.5 gratuit, 300+ modèles avec abonnement)
      # device_code OAuth, géré par Hermès agent natif au boot
      NOUS_DEFAULT_MODEL:  ${NOUS_DEFAULT_MODEL:-stepfun/step-3.5-flash}
      # Fallback / transition courte : OpenRouter (Hatim a ~10€ de credits)
      OPENROUTER_API_KEY:  ${OPENROUTER_API_KEY:-}
      OPENROUTER_FALLBACK_MODEL: ${OPENROUTER_FALLBACK_MODEL:-deepseek/deepseek-chat-v4-flash}
      # Optionnels (rarement utilisés)
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY:      ${GEMINI_API_KEY:-}
      OPENAI_API_KEY:      ${OPENAI_API_KEY:-}

      # ----- Channels (empty = disabled at bootstrap) -----
      # Pas de Vapi — voix gérée par ElevenLabs Conversational AI côté client
      WHATSAPP_TOKEN:         ${WHATSAPP_TOKEN:-}
      TELEGRAM_BOT_TOKEN:     ${TELEGRAM_BOT_TOKEN:-}
      RESEND_API_KEY:         ${RESEND_API_KEY:-}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}

      # ----- Skill activation list -----
      # 4 skills MVP LLM-only — overridable par le control-plane selon vertical
      ENABLED_SKILLS:      ${ENABLED_SKILLS:-briefing-quotidien,reception-call,devis-from-description,relance-impayes}

      # ----- Supabase write-back (Hermes Platform DB) -----
      SUPABASE_URL:                ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY:   ${SUPABASE_SERVICE_ROLE_KEY:-}

      # ----- Runtime tuning -----
      TZ:                  ${TZ:-Europe/Paris}
      LOG_LEVEL:           ${LOG_LEVEL:-info}
    volumes:
      - hermes_data:/data
      - hermes_skills:/skills
      - hermes_profiles:/profiles
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9119/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    labels:
      hermes.platform.client: ${CLIENT_SLUG:-unknown}
      hermes.platform.version: v1
      coolify.managed: "true"
      # ----- Traefik routing (Coolify proxy) -----
      # Container must be on the `coolify` network for Traefik DNS resolution.
      #
      # WHY everything is namespaced by COOLIFY_RESOURCE_UUID (do not regress):
      # The previous version used `${CLIENT_SLUG}` AND a static service name
      # `hermes`. CLIENT_SLUG is defined in the service's `environment:`,
      # NOT in Coolify's shell render-time scope, so labels containing
      # `${CLIENT_SLUG}` were emitted with the literal placeholder text.
      # Worse, every tenant container declared the same `traefik.http.services.hermes`
      # service — Traefik treated all running tenants as backends of one
      # shared pool and load-balanced requests round-robin between them.
      # A request to tenant A's URL would then 50% of the time hit tenant
      # B's container, leaking SESSION_TOKEN and session lists across
      # tenants and breaking chat persistence in the dashboard UI.
      #
      # COOLIFY_RESOURCE_UUID *is* injected by Coolify at compose-render
      # time (always unique per app), and SERVICE_FQDN_HERMES carries the
      # FQDN configured for this app — both are reliable substitutions.
      traefik.enable: "true"
      traefik.docker.network: "coolify"
      traefik.http.services.hermes-${COOLIFY_RESOURCE_UUID:-singleton}.loadbalancer.server.port: "9119"
      # HTTPS router — uses the FQDN Coolify configured for this app.
      traefik.http.routers.hermes-${COOLIFY_RESOURCE_UUID:-singleton}-https.rule: "Host(`${SERVICE_FQDN_HERMES}`)"
      traefik.http.routers.hermes-${COOLIFY_RESOURCE_UUID:-singleton}-https.entrypoints: "https"
      traefik.http.routers.hermes-${COOLIFY_RESOURCE_UUID:-singleton}-https.tls: "true"
      traefik.http.routers.hermes-${COOLIFY_RESOURCE_UUID:-singleton}-https.tls.certresolver: "letsencrypt"
      traefik.http.routers.hermes-${COOLIFY_RESOURCE_UUID:-singleton}-https.service: "hermes-${COOLIFY_RESOURCE_UUID:-singleton}"
      # HTTP -> HTTPS redirect
      traefik.http.routers.hermes-${COOLIFY_RESOURCE_UUID:-singleton}-http.rule: "Host(`${SERVICE_FQDN_HERMES}`)"
      traefik.http.routers.hermes-${COOLIFY_RESOURCE_UUID:-singleton}-http.entrypoints: "http"
      traefik.http.routers.hermes-${COOLIFY_RESOURCE_UUID:-singleton}-http.middlewares: "redirect-to-https@internal"
    networks:
      - default
      - coolify

  # ---------------------------------------------------------------------------
  # Optional: Paperclip (issue tracker / task queue used by some skills)
  # Activate with:  docker compose --profile with-paperclip up -d
  # ---------------------------------------------------------------------------
  paperclip:
    container_name: paperclip-${CLIENT_SLUG:-unknown}
    image: nousresearch/paperclip:latest
    profiles: ["with-paperclip"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PAPERCLIP_PORT:-7777}:7777"
    environment:
      CLIENT_SLUG:           ${CLIENT_SLUG}
      PAPERCLIP_API_TOKEN:   ${PAPERCLIP_API_TOKEN:-}
      HERMES_BASE_URL:       http://hermes:9119
      HERMES_API_TOKEN:      ${HERMES_API_TOKEN}
    volumes:
      - paperclip_data:/data
    depends_on:
      hermes:
        condition: service_healthy
    labels:
      hermes.platform.client: ${CLIENT_SLUG:-unknown}
      coolify.managed: "true"

volumes:
  hermes_data:
    name: hermes_${CLIENT_SLUG:-unknown}_data
  hermes_skills:
    name: hermes_${CLIENT_SLUG:-unknown}_skills
  hermes_profiles:
    name: hermes_${CLIENT_SLUG:-unknown}_profiles
  paperclip_data:
    name: paperclip_${CLIENT_SLUG:-unknown}_data

networks:
  coolify:
    external: true
